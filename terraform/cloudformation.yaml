AWSTemplateFormatVersion: "2010-09-09"
Description: "Pokedoku Helper - Static Website Hosting"

Parameters:
  DomainName:
    Type: String
    Default: "pokedoku-helper.com"
    Description: "Domain name to register"

  DailyPuzzleFetcherCodeS3Bucket:
    Type: String
    Description: "S3 bucket containing the daily puzzle Lambda zip"

  DailyPuzzleFetcherCodeS3Key:
    Type: String
    Description: "S3 key for the daily puzzle Lambda zip"

  DailyPuzzleAlertEmail:
    Type: String
    Default: ""
    Description: "Email address to receive daily puzzle Lambda failure alerts"

  PuzzleStatisticsFunctionArn:
    Type: String
    Description: "ARN of the puzzle statistics Lambda function"

Conditions:
  HasDailyPuzzleAlertEmail: !Not [!Equals [!Ref DailyPuzzleAlertEmail, ""]]
  HasPuzzleStatisticsFunctionArn: !Not [!Equals [!Ref PuzzleStatisticsFunctionArn, ""]]
  
Resources:
  # S3 Bucket for website content
  WebsiteBucket:
    Type: AWS::S3::Bucket 
    Properties:
      BucketName: !Ref DomainName
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !Ref PuzzleStatisticsFunctionArn
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: data/puzzles/
                  - Name: suffix
                    Value: .json
  
  # Bucket Policy for public read access
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Join ["", ["arn:aws:s3:::", !Ref WebsiteBucket, "/*"]]

  PuzzleFetcherRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PuzzleFetcherS3WritePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
            Resource:
              - !Join ["", ["arn:aws:s3:::", !Ref WebsiteBucket, "/data/runtime/today-puzzle.json"]]
              - !Join ["", ["arn:aws:s3:::", !Ref WebsiteBucket, "/data/puzzles/*"]]
 
  DailyPuzzleFetcherFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs20.x
      Handler: daily-puzzle-fetcher.handler
      Role: !GetAtt PuzzleFetcherRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          BUCKET_NAME: !Ref WebsiteBucket
          OBJECT_KEY: data/runtime/today-puzzle.json
      Code:
        S3Bucket: !Ref DailyPuzzleFetcherCodeS3Bucket
        S3Key: !Ref DailyPuzzleFetcherCodeS3Key

  DailyPuzzleSchedule:
    Type: AWS::Events::Rule
    Properties:
      Description: Fetch and store the daily puzzle in S3
      ScheduleExpression: cron(5 0 * * ? *)
      State: ENABLED
      Targets:
        - Arn: !GetAtt DailyPuzzleFetcherFunction.Arn
          Id: DailyPuzzleFetcherTarget

  DailyPuzzleScheduleInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DailyPuzzleFetcherFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DailyPuzzleSchedule.Arn

  DailyPuzzleAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::StackName}-daily-puzzle-alerts"

  DailyPuzzleAlertsEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasDailyPuzzleAlertEmail
    Properties:
      Protocol: email
      Endpoint: !Ref DailyPuzzleAlertEmail
      TopicArn: !Ref DailyPuzzleAlertsTopic

  DailyPuzzleFetcherErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Alerts when the daily puzzle Lambda reports errors"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref DailyPuzzleFetcherFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref DailyPuzzleAlertsTopic

  # ACM Certificate (must be us-east-1 for CloudFront)
  SSLCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames:
        - !Sub "*.${DomainName}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZone

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Aliases:
          - !Sub "www.${DomainName}"
        DefaultRootObject: index.html
        HttpVersion: http2and3
        IPAddressType: ipv4
        PriceClass: PriceClass_All
        ViewerCertificate:
          AcmCertificateArn: !Ref SSLCertificate
          SslSupportMethod: sni-only
        Origins:
          - DomainName: !Select [2, !Split ["/", !GetAtt WebsiteBucket.WebsiteURL]]
            Id: S3Origin
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # CachingOptimized

  # Route53 Hosted Zone
  HostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName

  # DNS A Record for www
  WWWRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Sub "www.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2 # CloudFront hosted zone ID

Outputs:
  BucketName:
    Description: "S3 Bucket Name"
    Value: !Ref WebsiteBucket
    Export:
      Name: !Join ["", [!Ref "AWS::StackName", "-BucketName"]]

  CloudFrontDistributionId:
    Description: "CloudFront Distribution ID"
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Join ["", [!Ref "AWS::StackName", "-DistributionId"]]

  CloudFrontDomain:
    Description: "CloudFront Domain Name"
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Join ["", [!Ref "AWS::StackName", "-CloudFrontDomain"]]

  S3WebsiteURL:
    Description: "S3 Website Endpoint"
    Value: !GetAtt WebsiteBucket.WebsiteURL
    Export:
      Name: !Join ["", [!Ref "AWS::StackName", "-WebsiteURL"]]

  HostedZoneId:
    Description: "Route53 Hosted Zone ID"
    Value: !Ref HostedZone
    Export:
      Name: !Join ["", [!Ref "AWS::StackName", "-HostedZoneID"]]

  DailyPuzzleFetcherFunctionName:
    Description: "Daily puzzle Lambda function name"
    Value: !Ref DailyPuzzleFetcherFunction
    Export:
      Name: !Join ["", [!Ref "AWS::StackName", "-DailyPuzzleFetcherFunction"]]
