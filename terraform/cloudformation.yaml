AWSTemplateFormatVersion: "2010-09-09"
Description: "Pokedoku Helper - Static Website Hosting"

Parameters:
  DomainName:
    Type: String
    Default: "pokedoku-helper.com"
    Description: "Domain name to register"

Resources:
  # S3 Bucket for website content
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref DomainName
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred

  # Bucket Policy for public read access
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Join ["", ["arn:aws:s3:::", !Ref WebsiteBucket, "/*"]]

  # ACM Certificate (must be us-east-1 for CloudFront)
  SSLCertificate:
    Type: AWS::ACM::Certificate
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames:
        - !Join ["*.", [!Ref DomainName]]
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          ValidationDomain: !Ref DomainName

  # CloudFront Origin Access Control
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Ref DomainName
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Aliases:
          - !Join ["www.", [!Ref DomainName]]
        DefaultRootObject: index.html
        HttpVersion: http2andhttp3
        IPAddressType: ipv4
        PriceClass: PriceClass_All
        ViewerCertificate:
          AcmCertificateArn: !Ref SSLCertificate
          SslSupportMethod: sni-only
        Origins:
          - DomainName: !GetAtt WebsiteBucket.WebsiteURL
            Id: S3Origin
            OriginAccessControlId: !Ref CloudFrontOAC
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # CachingOptimized
          FunctionAssociations: []

  # Route53 Hosted Zone
  HostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName

  # DNS A Record for www
  WWWRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Join ["www.", [!Ref DomainName]]
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2 # CloudFront hosted zone ID

  # CNAME Record to verify domain (will be created after ACM validation)
  ACMValidationRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Select [0, !Split ["=", !Select [0, !Split ["=", !Ref SSLCertificate]]]]
      Type: CNAME
      TTL: 300
      ResourceRecords:
        - !Select [1, !Split ["=", !Select [0, !Split ["=", !Ref SSLCertificate]]]]

Outputs:
  BucketName:
    Description: "S3 Bucket Name"
    Value: !Ref WebsiteBucket
    Export:
      Name: !Join ["", [!Ref "AWS::StackName", "-BucketName"]]

  CloudFrontDistributionId:
    Description: "CloudFront Distribution ID"
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Join ["", [!Ref "AWS::StackName", "-DistributionId"]]

  CloudFrontDomain:
    Description: "CloudFront Domain Name"
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Join ["", [!Ref "AWS::StackName", "-CloudFrontDomain"]]

  S3WebsiteURL:
    Description: "S3 Website Endpoint"
    Value: !GetAtt WebsiteBucket.WebsiteURL
    Export:
      Name: !Join ["", [!Ref "AWS::StackName", "-WebsiteURL"]]

  HostedZoneId:
    Description: "Route53 Hosted Zone ID"
    Value: !Ref HostedZone
    Export:
      Name: !Join ["", [!Ref "AWS::StackName", "-HostedZoneID"]]