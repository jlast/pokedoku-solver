AWSTemplateFormatVersion: "2010-09-09"
Description: "Pokedoku Helper - User Dex API (api.pokedoku-helper.com)"

Parameters:
  DomainName:
    Type: String
    Default: "pokedoku-helper.com"
    Description: "Base domain managed in Route53"

  ApiSubdomain:
    Type: String
    Default: "api"
    Description: "API subdomain prefix"

  HostedZoneId:
    Type: String
    Description: "Route53 hosted zone id for DomainName"

  ApiCertificateArn:
    Type: String
    Description: "ACM certificate ARN for api.pokedoku-helper.com (same region as API Gateway)"

  UserDexGetCodeS3Bucket:
    Type: String
    Description: "S3 bucket containing user-dex-get Lambda zip"

  UserDexGetCodeS3Key:
    Type: String
    Description: "S3 key for user-dex-get Lambda zip"

  UserDexPatchCodeS3Bucket:
    Type: String
    Description: "S3 bucket containing user-dex-patch Lambda zip"

  UserDexPatchCodeS3Key:
    Type: String
    Description: "S3 key for user-dex-patch Lambda zip"

  UserDexSharedGetCodeS3Bucket:
    Type: String
    Description: "S3 bucket containing user-dex-shared-get Lambda zip"

  UserDexSharedGetCodeS3Key:
    Type: String
    Description: "S3 key for user-dex-shared-get Lambda zip"

  SettingsGetCodeS3Bucket:
    Type: String
    Description: "S3 bucket containing settings-get Lambda zip"

  SettingsGetCodeS3Key:
    Type: String
    Description: "S3 key for settings-get Lambda zip"

  SettingsPatchCodeS3Bucket:
    Type: String
    Description: "S3 bucket containing settings-patch Lambda zip"

  SettingsPatchCodeS3Key:
    Type: String
    Description: "S3 key for settings-patch Lambda zip"

  AllowedOrigins:
    Type: String
    Default: "https://www.pokedoku-helper.com,http://localhost:4321,http://127.0.0.1:4321"
    Description: "Comma-separated CORS allowed origins"

  CognitoRegion:
    Type: String
    Default: "us-east-1"

  CognitoUserPoolId:
    Type: String
    Description: "Cognito User Pool ID"

  CognitoClientId:
    Type: String
    Description: "Cognito App Client ID"

Resources:
  UserDexProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: UserDexProfiles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  UserSettingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: UserSettings
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  UserActivityTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: UserActivity
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  UserDexLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: UserDexDynamoPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt UserDexProfilesTable.Arn
                  - !GetAtt UserSettingsTable.Arn
                  - !GetAtt UserActivityTable.Arn

  UserDexGetFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs20.x
      Handler: user-dex-get.handler
      Role: !GetAtt UserDexLambdaRole.Arn
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          USER_DEX_TABLE_NAME: !Ref UserDexProfilesTable
          USER_ACTIVITY_TABLE_NAME: !Ref UserActivityTable
          COGNITO_REGION: !Ref CognitoRegion
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref CognitoClientId
          ALLOWED_ORIGINS: !Ref AllowedOrigins
      Code:
        S3Bucket: !Ref UserDexGetCodeS3Bucket
        S3Key: !Ref UserDexGetCodeS3Key

  UserDexPatchFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs20.x
      Handler: user-dex-patch.handler
      Role: !GetAtt UserDexLambdaRole.Arn
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          USER_DEX_TABLE_NAME: !Ref UserDexProfilesTable
          USER_ACTIVITY_TABLE_NAME: !Ref UserActivityTable
          COGNITO_REGION: !Ref CognitoRegion
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref CognitoClientId
          ALLOWED_ORIGINS: !Ref AllowedOrigins
      Code:
        S3Bucket: !Ref UserDexPatchCodeS3Bucket
        S3Key: !Ref UserDexPatchCodeS3Key

  UserDexSharedGetFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs20.x
      Handler: user-dex-shared-get.handler
      Role: !GetAtt UserDexLambdaRole.Arn
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          USER_DEX_TABLE_NAME: !Ref UserDexProfilesTable
          SETTINGS_TABLE_NAME: !Ref UserSettingsTable
          USER_ACTIVITY_TABLE_NAME: !Ref UserActivityTable
          COGNITO_REGION: !Ref CognitoRegion
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref CognitoClientId
          ALLOWED_ORIGINS: !Ref AllowedOrigins
      Code:
        S3Bucket: !Ref UserDexSharedGetCodeS3Bucket
        S3Key: !Ref UserDexSharedGetCodeS3Key

  SettingsGetFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs20.x
      Handler: settings-get.handler
      Role: !GetAtt UserDexLambdaRole.Arn
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          USER_DEX_TABLE_NAME: !Ref UserDexProfilesTable
          SETTINGS_TABLE_NAME: !Ref UserSettingsTable
          USER_ACTIVITY_TABLE_NAME: !Ref UserActivityTable
          COGNITO_REGION: !Ref CognitoRegion
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref CognitoClientId
          ALLOWED_ORIGINS: !Ref AllowedOrigins
      Code:
        S3Bucket: !Ref SettingsGetCodeS3Bucket
        S3Key: !Ref SettingsGetCodeS3Key

  SettingsPatchFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs20.x
      Handler: settings-patch.handler
      Role: !GetAtt UserDexLambdaRole.Arn
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          USER_DEX_TABLE_NAME: !Ref UserDexProfilesTable
          SETTINGS_TABLE_NAME: !Ref UserSettingsTable
          USER_ACTIVITY_TABLE_NAME: !Ref UserActivityTable
          COGNITO_REGION: !Ref CognitoRegion
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref CognitoClientId
          ALLOWED_ORIGINS: !Ref AllowedOrigins
      Code:
        S3Bucket: !Ref SettingsPatchCodeS3Bucket
        S3Key: !Ref SettingsPatchCodeS3Key

  UserDexApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-user-dex-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: !Split [",", !Ref AllowedOrigins]
        AllowMethods:
          - GET
          - PATCH
          - OPTIONS
        AllowHeaders:
          - authorization
          - content-type

  UserDexGetIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref UserDexApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt UserDexGetFunction.Arn
      PayloadFormatVersion: "2.0"

  UserDexPatchIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref UserDexApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt UserDexPatchFunction.Arn
      PayloadFormatVersion: "2.0"

  UserDexSharedGetIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref UserDexApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt UserDexSharedGetFunction.Arn
      PayloadFormatVersion: "2.0"

  SettingsGetIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref UserDexApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt SettingsGetFunction.Arn
      PayloadFormatVersion: "2.0"

  SettingsPatchIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref UserDexApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt SettingsPatchFunction.Arn
      PayloadFormatVersion: "2.0"

  UserDexGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref UserDexApi
      RouteKey: "GET /user-dex"
      Target: !Sub "integrations/${UserDexGetIntegration}"

  UserDexPatchRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref UserDexApi
      RouteKey: "PATCH /user-dex"
      Target: !Sub "integrations/${UserDexPatchIntegration}"

  UserDexSharedGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref UserDexApi
      RouteKey: "GET /user-dex/{userId}"
      Target: !Sub "integrations/${UserDexSharedGetIntegration}"

  SettingsGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref UserDexApi
      RouteKey: "GET /settings"
      Target: !Sub "integrations/${SettingsGetIntegration}"

  SettingsPatchRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref UserDexApi
      RouteKey: "PATCH /settings"
      Target: !Sub "integrations/${SettingsPatchIntegration}"

  UserDexApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref UserDexApi
      StageName: prod
      AutoDeploy: true

  UserDexGetPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref UserDexGetFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${UserDexApi}/*/*/user-dex"

  UserDexPatchPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref UserDexPatchFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${UserDexApi}/*/*/user-dex"

  UserDexSharedGetPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref UserDexSharedGetFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${UserDexApi}/*/*/user-dex/*"

  SettingsGetPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref SettingsGetFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${UserDexApi}/*/*/settings"

  SettingsPatchPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref SettingsPatchFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${UserDexApi}/*/*/settings"

  UserDexApiDomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Sub "${ApiSubdomain}.${DomainName}"
      DomainNameConfigurations:
        - CertificateArn: !Ref ApiCertificateArn
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  UserDexApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref UserDexApi
      DomainName: !Ref UserDexApiDomainName
      Stage: !Ref UserDexApiStage

  UserDexApiRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "${ApiSubdomain}.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt UserDexApiDomainName.RegionalDomainName
        HostedZoneId: !GetAtt UserDexApiDomainName.RegionalHostedZoneId

Outputs:
  UserDexApiBaseUrl:
    Description: User Dex API base URL
    Value: !Sub "https://${ApiSubdomain}.${DomainName}"

  UserDexGetFunctionName:
    Description: User Dex GET Lambda function name
    Value: !Ref UserDexGetFunction

  UserDexPatchFunctionName:
    Description: User Dex PATCH Lambda function name
    Value: !Ref UserDexPatchFunction

  UserDexProfilesTableName:
    Description: User Dex DynamoDB table name
    Value: !Ref UserDexProfilesTable

  UserSettingsTableName:
    Description: User Settings DynamoDB table name
    Value: !Ref UserSettingsTable
