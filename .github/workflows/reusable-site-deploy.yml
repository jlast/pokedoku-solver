name: Reusable Site Deploy

on:
  workflow_call:
    inputs:
      site_changed:
        required: true
        type: string
      data_changed:
        required: true
        type: string
      images_changed:
        required: true
        type: string
      website_stack_changed:
        required: true
        type: string

permissions:
  contents: read

jobs:
  site-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.6.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Build
        if: inputs.site_changed == 'true' || inputs.data_changed == 'true'
        env:
          PUBLIC_ENABLE_AUTH: ${{ vars.PUBLIC_ENABLE_AUTH }}
          PUBLIC_ALLOW_AUTH_QUERY_OVERRIDE: ${{ vars.PUBLIC_ALLOW_AUTH_QUERY_OVERRIDE }}
          PUBLIC_COGNITO_REGION: ${{ vars.PUBLIC_COGNITO_REGION }}
          PUBLIC_COGNITO_USER_POOL_ID: ${{ vars.PUBLIC_COGNITO_USER_POOL_ID }}
          PUBLIC_COGNITO_CLIENT_ID: ${{ vars.PUBLIC_COGNITO_CLIENT_ID }}
          PUBLIC_COGNITO_DOMAIN: ${{ vars.PUBLIC_COGNITO_DOMAIN }}
          PUBLIC_COGNITO_REDIRECT_SIGN_IN: ${{ vars.PUBLIC_COGNITO_REDIRECT_SIGN_IN }}
          PUBLIC_COGNITO_REDIRECT_SIGN_OUT: ${{ vars.PUBLIC_COGNITO_REDIRECT_SIGN_OUT }}
          PUBLIC_USER_DEX_API_BASE_URL: ${{ vars.PUBLIC_USER_DEX_API_BASE_URL }}
        run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_GITHUB_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_GITHUB_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Validate website CloudFormation template
        if: inputs.website_stack_changed == 'true'
        run: aws cloudformation validate-template --template-body file://terraform/cloudformation.yaml

      - name: Deploy website CloudFormation stack
        if: inputs.website_stack_changed == 'true'
        env:
          CLOUDFORMATION_STACK_NAME: ${{ secrets.CLOUDFORMATION_STACK_NAME }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          DAILY_PUZZLE_ALERT_EMAIL: ${{ secrets.DAILY_PUZZLE_ALERT_EMAIL }}
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
        run: bash .github/scripts/deploy-website-stack.sh

      - name: Sync build output and data to S3
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          if [ "${{ inputs.site_changed }}" = "true" ]; then
            aws s3 sync astro/dist/ s3://${S3_BUCKET_NAME}/ --delete --exclude "lambda/*" --exclude "images/*" --exclude "data/*"
          else
            echo "Skipping astro/dist sync (no site changes)."
          fi

          if [ "${{ inputs.data_changed }}" = "true" ]; then
            aws s3 sync public/data/ s3://${S3_BUCKET_NAME}/data/ --exclude "runtime/*"
          else
            echo "Skipping public/data sync (no data changes)."
          fi

      - name: Sync images to S3
        if: inputs.images_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: aws s3 sync public/images/ s3://${S3_BUCKET_NAME}/images/ --cache-control "public,max-age=31536000,immutable"

      - name: Invalidate CloudFront cache
        if: inputs.site_changed == 'true' || inputs.images_changed == 'true' || inputs.data_changed == 'true' || inputs.website_stack_changed == 'true'
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
