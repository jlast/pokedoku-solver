name: Reusable Site Deploy

on:
  workflow_call:
    inputs:
      site_changed:
        required: true
        type: string
      data_changed:
        required: true
        type: string
      images_changed:
        required: true
        type: string

permissions:
  contents: read

jobs:
  site-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci && npm ci --prefix astro
        
      - name: Build
        if: inputs.site_changed == 'true' || inputs.data_changed == 'true'
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_GITHUB_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_GITHUB_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync build output and data to S3
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          if [ "${{ inputs.site_changed }}" = "true" ]; then
            aws s3 sync astro/dist/ s3://${S3_BUCKET_NAME}/ --delete --exclude "lambda/*" --exclude "images/*" --exclude "data/*"
          else
            echo "Skipping astro/dist sync (no site changes)."
          fi

          if [ "${{ inputs.data_changed }}" = "true" ]; then
            aws s3 sync public/data/ s3://${S3_BUCKET_NAME}/data/ --exclude "runtime/*"
          else
            echo "Skipping public/data sync (no data changes)."
          fi

      - name: Sync images to S3
        if: inputs.images_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: aws s3 sync public/images/ s3://${S3_BUCKET_NAME}/images/ --cache-control "public,max-age=31536000,immutable"

      - name: Invalidate CloudFront cache
        if: inputs.site_changed == 'true' || inputs.images_changed == 'true' || inputs.data_changed == 'true'
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
