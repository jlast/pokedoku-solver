name: Reusable Public API Deploy

on:
  workflow_call:
    inputs:
      user_dex_get_lambda_changed:
        required: true
        type: string
      user_dex_patch_lambda_changed:
        required: true
        type: string
      user_dex_shared_get_lambda_changed:
        required: true
        type: string
      settings_get_lambda_changed:
        required: true
        type: string
      settings_patch_lambda_changed:
        required: true
        type: string
      user_puzzles_get_lambda_changed:
        required: true
        type: string
      user_puzzle_get_lambda_changed:
        required: true
        type: string
      user_puzzle_put_lambda_changed:
        required: true
        type: string
      admin_bonus_puzzle_post_lambda_changed:
        required: true
        type: string
      user_dex_stack_changed:
        required: true
        type: string

permissions:
  contents: read

jobs:
  public-api-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.6.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_GITHUB_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_GITHUB_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Package user dex get Lambda
        if: inputs.user_dex_get_lambda_changed == 'true'
        run: pnpm package:user-dex-get-lambda

      - name: Upload user dex get Lambda artifact
        if: inputs.user_dex_get_lambda_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          USER_DEX_GET_LAMBDA_KEY=lambda/user-dex-get-${{ github.sha }}.zip
          aws s3 cp dist-lambda/user-dex-get.zip s3://${S3_BUCKET_NAME}/${USER_DEX_GET_LAMBDA_KEY}
          echo "USER_DEX_GET_LAMBDA_KEY=${USER_DEX_GET_LAMBDA_KEY}" >> "$GITHUB_ENV"

      - name: Package user dex patch Lambda
        if: inputs.user_dex_patch_lambda_changed == 'true'
        run: pnpm package:user-dex-patch-lambda

      - name: Upload user dex patch Lambda artifact
        if: inputs.user_dex_patch_lambda_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          USER_DEX_PATCH_LAMBDA_KEY=lambda/user-dex-patch-${{ github.sha }}.zip
          aws s3 cp dist-lambda/user-dex-patch.zip s3://${S3_BUCKET_NAME}/${USER_DEX_PATCH_LAMBDA_KEY}
          echo "USER_DEX_PATCH_LAMBDA_KEY=${USER_DEX_PATCH_LAMBDA_KEY}" >> "$GITHUB_ENV"

      - name: Validate user dex API CloudFormation template
        run: aws cloudformation validate-template --template-body file://terraform/user-dex-api-stack.yaml

      - name: Package user dex shared get Lambda
        if: inputs.user_dex_shared_get_lambda_changed == 'true'
        run: pnpm package:user-dex-shared-get-lambda

      - name: Upload user dex shared get Lambda artifact
        if: inputs.user_dex_shared_get_lambda_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          USER_DEX_SHARED_GET_LAMBDA_KEY=lambda/user-dex-shared-get-${{ github.sha }}.zip
          aws s3 cp dist-lambda/user-dex-shared-get.zip s3://${S3_BUCKET_NAME}/${USER_DEX_SHARED_GET_LAMBDA_KEY}
          echo "USER_DEX_SHARED_GET_LAMBDA_KEY=${USER_DEX_SHARED_GET_LAMBDA_KEY}" >> "$GITHUB_ENV"

      - name: Package settings get Lambda
        if: inputs.settings_get_lambda_changed == 'true'
        run: pnpm package:settings-get-lambda

      - name: Upload settings get Lambda artifact
        if: inputs.settings_get_lambda_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          SETTINGS_GET_LAMBDA_KEY=lambda/settings-get-${{ github.sha }}.zip
          aws s3 cp dist-lambda/settings-get.zip s3://${S3_BUCKET_NAME}/${SETTINGS_GET_LAMBDA_KEY}
          echo "SETTINGS_GET_LAMBDA_KEY=${SETTINGS_GET_LAMBDA_KEY}" >> "$GITHUB_ENV"

      - name: Package settings patch Lambda
        if: inputs.settings_patch_lambda_changed == 'true'
        run: pnpm package:settings-patch-lambda

      - name: Upload settings patch Lambda artifact
        if: inputs.settings_patch_lambda_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          SETTINGS_PATCH_LAMBDA_KEY=lambda/settings-patch-${{ github.sha }}.zip
          aws s3 cp dist-lambda/settings-patch.zip s3://${S3_BUCKET_NAME}/${SETTINGS_PATCH_LAMBDA_KEY}
          echo "SETTINGS_PATCH_LAMBDA_KEY=${SETTINGS_PATCH_LAMBDA_KEY}" >> "$GITHUB_ENV"

      - name: Package user puzzles get Lambda
        if: inputs.user_puzzles_get_lambda_changed == 'true'
        run: pnpm package:user-puzzles-get-lambda

      - name: Upload user puzzles get Lambda artifact
        if: inputs.user_puzzles_get_lambda_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          USER_PUZZLES_GET_LAMBDA_KEY=lambda/user-puzzles-get-${{ github.sha }}.zip
          aws s3 cp dist-lambda/user-puzzles-get.zip s3://${S3_BUCKET_NAME}/${USER_PUZZLES_GET_LAMBDA_KEY}
          echo "USER_PUZZLES_GET_LAMBDA_KEY=${USER_PUZZLES_GET_LAMBDA_KEY}" >> "$GITHUB_ENV"

      - name: Package user puzzle get Lambda
        if: inputs.user_puzzle_get_lambda_changed == 'true'
        run: pnpm package:user-puzzle-get-lambda

      - name: Upload user puzzle get Lambda artifact
        if: inputs.user_puzzle_get_lambda_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          USER_PUZZLE_GET_LAMBDA_KEY=lambda/user-puzzle-get-${{ github.sha }}.zip
          aws s3 cp dist-lambda/user-puzzle-get.zip s3://${S3_BUCKET_NAME}/${USER_PUZZLE_GET_LAMBDA_KEY}
          echo "USER_PUZZLE_GET_LAMBDA_KEY=${USER_PUZZLE_GET_LAMBDA_KEY}" >> "$GITHUB_ENV"

      - name: Package user puzzle put Lambda
        if: inputs.user_puzzle_put_lambda_changed == 'true'
        run: pnpm package:user-puzzle-put-lambda

      - name: Upload user puzzle put Lambda artifact
        if: inputs.user_puzzle_put_lambda_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          USER_PUZZLE_PUT_LAMBDA_KEY=lambda/user-puzzle-put-${{ github.sha }}.zip
          aws s3 cp dist-lambda/user-puzzle-put.zip s3://${S3_BUCKET_NAME}/${USER_PUZZLE_PUT_LAMBDA_KEY}
          echo "USER_PUZZLE_PUT_LAMBDA_KEY=${USER_PUZZLE_PUT_LAMBDA_KEY}" >> "$GITHUB_ENV"

      - name: Package admin bonus puzzle Lambda
        if: inputs.admin_bonus_puzzle_post_lambda_changed == 'true'
        run: pnpm package:admin-bonus-puzzle-post-lambda

      - name: Upload admin bonus puzzle Lambda artifact
        if: inputs.admin_bonus_puzzle_post_lambda_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          ADMIN_BONUS_PUZZLE_POST_LAMBDA_KEY=lambda/admin-bonus-puzzle-post-${{ github.sha }}.zip
          aws s3 cp dist-lambda/admin-bonus-puzzle-post.zip s3://${S3_BUCKET_NAME}/${ADMIN_BONUS_PUZZLE_POST_LAMBDA_KEY}
          echo "ADMIN_BONUS_PUZZLE_POST_LAMBDA_KEY=${ADMIN_BONUS_PUZZLE_POST_LAMBDA_KEY}" >> "$GITHUB_ENV"

      - name: Deploy public API CloudFormation stack
        if: inputs.user_dex_get_lambda_changed == 'true' || inputs.user_dex_patch_lambda_changed == 'true' || inputs.user_dex_shared_get_lambda_changed == 'true' || inputs.settings_get_lambda_changed == 'true' || inputs.settings_patch_lambda_changed == 'true' || inputs.user_puzzles_get_lambda_changed == 'true' || inputs.user_puzzle_get_lambda_changed == 'true' || inputs.user_puzzle_put_lambda_changed == 'true' || inputs.admin_bonus_puzzle_post_lambda_changed == 'true' || inputs.user_dex_stack_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          CLOUDFORMATION_STACK_NAME: ${{ secrets.CLOUDFORMATION_STACK_NAME }}
          USER_DEX_GET_LAMBDA_CHANGED: ${{ inputs.user_dex_get_lambda_changed }}
          USER_DEX_PATCH_LAMBDA_CHANGED: ${{ inputs.user_dex_patch_lambda_changed }}
          USER_DEX_SHARED_GET_LAMBDA_CHANGED: ${{ inputs.user_dex_shared_get_lambda_changed }}
          SETTINGS_GET_LAMBDA_CHANGED: ${{ inputs.settings_get_lambda_changed }}
          SETTINGS_PATCH_LAMBDA_CHANGED: ${{ inputs.settings_patch_lambda_changed }}
          USER_PUZZLES_GET_LAMBDA_CHANGED: ${{ inputs.user_puzzles_get_lambda_changed }}
          USER_PUZZLE_GET_LAMBDA_CHANGED: ${{ inputs.user_puzzle_get_lambda_changed }}
          USER_PUZZLE_PUT_LAMBDA_CHANGED: ${{ inputs.user_puzzle_put_lambda_changed }}
          ADMIN_BONUS_PUZZLE_POST_LAMBDA_CHANGED: ${{ inputs.admin_bonus_puzzle_post_lambda_changed }}
          USER_DEX_GET_LAMBDA_KEY: ${{ env.USER_DEX_GET_LAMBDA_KEY }}
          USER_DEX_PATCH_LAMBDA_KEY: ${{ env.USER_DEX_PATCH_LAMBDA_KEY }}
          USER_DEX_SHARED_GET_LAMBDA_KEY: ${{ env.USER_DEX_SHARED_GET_LAMBDA_KEY }}
          SETTINGS_GET_LAMBDA_KEY: ${{ env.SETTINGS_GET_LAMBDA_KEY }}
          SETTINGS_PATCH_LAMBDA_KEY: ${{ env.SETTINGS_PATCH_LAMBDA_KEY }}
          USER_PUZZLES_GET_LAMBDA_KEY: ${{ env.USER_PUZZLES_GET_LAMBDA_KEY }}
          USER_PUZZLE_GET_LAMBDA_KEY: ${{ env.USER_PUZZLE_GET_LAMBDA_KEY }}
          USER_PUZZLE_PUT_LAMBDA_KEY: ${{ env.USER_PUZZLE_PUT_LAMBDA_KEY }}
          ADMIN_BONUS_PUZZLE_POST_LAMBDA_KEY: ${{ env.ADMIN_BONUS_PUZZLE_POST_LAMBDA_KEY }}
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          API_SUBDOMAIN: ${{ vars.API_SUBDOMAIN }}
          HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
          API_CERTIFICATE_ARN: ${{ secrets.API_CERTIFICATE_ARN }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
          COGNITO_REGION: ${{ vars.COGNITO_REGION }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
        run: |
          echo "Public API deploy preflight values"
          echo "- stack: ${CLOUDFORMATION_STACK_NAME:-pokedoku-helper}-user-dex-api"
          echo "- domain: ${DOMAIN_NAME:-pokedoku-helper.com}"
          echo "- subdomain: ${API_SUBDOMAIN:-api}"
          echo "- hosted zone id present: $([ -n "${HOSTED_ZONE_ID:-}" ] && echo yes || echo no)"
          echo "- certificate arn present: $([ -n "${API_CERTIFICATE_ARN:-}" ] && echo yes || echo no)"
          echo "- cognito user pool id present: $([ -n "${COGNITO_USER_POOL_ID:-}" ] && echo yes || echo no)"
          echo "- cognito client id present: $([ -n "${COGNITO_CLIENT_ID:-}" ] && echo yes || echo no)"
          export DOMAIN_NAME="${DOMAIN_NAME:-pokedoku-helper.com}"
          export API_SUBDOMAIN="${API_SUBDOMAIN:-api}"
          export ALLOWED_ORIGINS="${ALLOWED_ORIGINS:-https://www.pokedoku-helper.com,http://localhost:4321,http://127.0.0.1:4321}"
          export COGNITO_REGION="${COGNITO_REGION:-us-east-1}"
          bash .github/scripts/deploy-public-api-stack.sh

      - name: Debug public API CloudFormation failure
        if: failure() && (inputs.user_dex_get_lambda_changed == 'true' || inputs.user_dex_patch_lambda_changed == 'true' || inputs.user_dex_shared_get_lambda_changed == 'true' || inputs.settings_get_lambda_changed == 'true' || inputs.settings_patch_lambda_changed == 'true' || inputs.user_puzzles_get_lambda_changed == 'true' || inputs.user_puzzle_get_lambda_changed == 'true' || inputs.user_puzzle_put_lambda_changed == 'true' || inputs.admin_bonus_puzzle_post_lambda_changed == 'true' || inputs.user_dex_stack_changed == 'true')
        env:
          CLOUDFORMATION_STACK_NAME: ${{ secrets.CLOUDFORMATION_STACK_NAME }}
        run: |
          STACK_NAME="${CLOUDFORMATION_STACK_NAME:-pokedoku-helper}-user-dex-api"
          echo "Recent events for ${STACK_NAME}"
          aws cloudformation describe-stack-events --stack-name "${STACK_NAME}" --max-items 25 || true
