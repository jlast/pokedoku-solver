name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs


  deploy-gh-pages:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  build-and-deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_GITHUB_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_GITHUB_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Package daily puzzle Lambda
        run: npm run package:daily-puzzle-lambda

      - name: Verify CloudFormation template revision
        run: |
          echo "Template from commit ${GITHUB_SHA}"
          if grep -E 'ACMValidationRecord|CloudFrontOAC' terraform/daily-puzzle-stack.yaml; then
            echo "Found deprecated resources in daily puzzle template; aborting deploy"
            exit 1
          fi

      - name: Upload daily puzzle Lambda artifact
        run: |
          LAMBDA_KEY=lambda/daily-puzzle-fetcher-${{ github.sha }}.zip
          aws s3 cp dist-lambda/daily-puzzle-fetcher.zip s3://${{ secrets.S3_BUCKET_NAME }}/${LAMBDA_KEY}
          echo "LAMBDA_KEY=${LAMBDA_KEY}" >> $GITHUB_ENV

      - name: Validate CloudFormation template
        run: aws cloudformation validate-template --template-body file://terraform/daily-puzzle-stack.yaml

      - name: Deploy CloudFormation stack
        env:
          CLOUDFORMATION_STACK_NAME: ${{ secrets.CLOUDFORMATION_STACK_NAME }}
          DAILY_PUZZLE_ALERT_EMAIL: ${{ secrets.DAILY_PUZZLE_ALERT_EMAIL }}
        run: |
          echo "Deploying commit ${GITHUB_SHA}"
          STACK_NAME=${CLOUDFORMATION_STACK_NAME:-pokedoku-helper}-daily-puzzle
          PARAM_OVERRIDES="TargetBucketName=${{ secrets.S3_BUCKET_NAME }} DailyPuzzleFetcherCodeS3Bucket=${{ secrets.S3_BUCKET_NAME }} DailyPuzzleFetcherCodeS3Key=${LAMBDA_KEY}"
          if [ -n "${DAILY_PUZZLE_ALERT_EMAIL}" ]; then
            PARAM_OVERRIDES="${PARAM_OVERRIDES} DailyPuzzleAlertEmail=${DAILY_PUZZLE_ALERT_EMAIL}"
          fi
          aws cloudformation deploy \
            --template-file terraform/daily-puzzle-stack.yaml \
            --stack-name ${STACK_NAME} \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides ${PARAM_OVERRIDES}

      - name: Dump CloudFormation failure events
        if: failure()
        env:
          CLOUDFORMATION_STACK_NAME: ${{ secrets.CLOUDFORMATION_STACK_NAME }}
        run: |
          STACK_NAME=${CLOUDFORMATION_STACK_NAME:-pokedoku-helper}-daily-puzzle
          aws cloudformation describe-stack-events \
            --stack-name ${STACK_NAME} \
            --max-items 100

      - name: Dump CloudFormation changeset failures
        if: failure()
        env:
          CLOUDFORMATION_STACK_NAME: ${{ secrets.CLOUDFORMATION_STACK_NAME }}
        run: |
          STACK_NAME=${CLOUDFORMATION_STACK_NAME:-pokedoku-helper}-daily-puzzle
          CHANGE_SET_ID=$(aws cloudformation list-change-sets --stack-name ${STACK_NAME} --query 'reverse(sort_by(Summaries,&CreationTime))[0].ChangeSetId' --output text || true)
          if [ -n "${CHANGE_SET_ID}" ] && [ "${CHANGE_SET_ID}" != "None" ]; then
            aws cloudformation describe-change-set \
              --change-set-name ${CHANGE_SET_ID} \
              --stack-name ${STACK_NAME}
          else
            echo "No change set found for stack ${STACK_NAME}"
          fi

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }}/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
