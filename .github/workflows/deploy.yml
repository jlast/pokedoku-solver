name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: Force deploy all site and infra targets
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      data_changed: ${{ steps.changes.outputs.data_changed }}
      site_changed: ${{ steps.changes.outputs.site_changed }}
      images_changed: ${{ steps.changes.outputs.images_changed }}
      daily_lambda_changed: ${{ steps.changes.outputs.daily_lambda_changed }}
      stats_lambda_changed: ${{ steps.changes.outputs.stats_lambda_changed }}
      daily_stack_changed: ${{ steps.changes.outputs.daily_stack_changed }}
      stats_stack_changed: ${{ steps.changes.outputs.stats_stack_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect deploy-relevant changes
        id: changes
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: bash .github/scripts/detect-changes.sh

  validate-and-pages:
    needs: detect-changes
    uses: ./.github/workflows/reusable-validate.yml
    permissions:
      contents: read
      pages: write
      id-token: write

  site-deploy:
    needs:
      - detect-changes
      - validate-and-pages
    uses: ./.github/workflows/reusable-site-deploy.yml
    secrets: inherit
    with:
      site_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_deploy) || needs.detect-changes.outputs.site_changed == 'true') && 'true' || 'false' }}
      data_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_deploy) || needs.detect-changes.outputs.data_changed == 'true') && 'true' || 'false' }}
      images_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_deploy) || needs.detect-changes.outputs.images_changed == 'true') && 'true' || 'false' }}

  infra-deploy:
    needs:
      - detect-changes
      - validate-and-pages
    uses: ./.github/workflows/reusable-infra-deploy.yml
    secrets: inherit
    with:
      daily_lambda_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_deploy) || needs.detect-changes.outputs.daily_lambda_changed == 'true') && 'true' || 'false' }}
      stats_lambda_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_deploy) || needs.detect-changes.outputs.stats_lambda_changed == 'true') && 'true' || 'false' }}
      daily_stack_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_deploy) || needs.detect-changes.outputs.daily_stack_changed == 'true') && 'true' || 'false' }}
      stats_stack_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_deploy) || needs.detect-changes.outputs.stats_stack_changed == 'true') && 'true' || 'false' }}
