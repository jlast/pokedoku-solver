name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_site_deploy:
        description: Force deploy website targets
        required: false
        default: false
        type: boolean
      force_infra_deploy:
        description: Force deploy infrastructure targets
        required: false
        default: false
        type: boolean
      force_public_api_deploy:
        description: Force deploy public API targets
        required: false
        default: false
        type: boolean
      force_dashboard_deploy:
        description: Force deploy dashboard targets
        required: false
        default: false
        type: boolean
      force_pokedoku_details_publish:
        description: Force publish pokedoku-details app
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      data_changed: ${{ steps.changes.outputs.data_changed }}
      site_changed: ${{ steps.changes.outputs.site_changed }}
      images_changed: ${{ steps.changes.outputs.images_changed }}
      daily_lambda_changed: ${{ steps.changes.outputs.daily_lambda_changed }}
      stats_lambda_changed: ${{ steps.changes.outputs.stats_lambda_changed }}
      daily_stack_changed: ${{ steps.changes.outputs.daily_stack_changed }}
      stats_stack_changed: ${{ steps.changes.outputs.stats_stack_changed }}
      website_stack_changed: ${{ steps.changes.outputs.website_stack_changed }}
      user_dex_get_lambda_changed: ${{ steps.changes.outputs.user_dex_get_lambda_changed }}
      user_dex_patch_lambda_changed: ${{ steps.changes.outputs.user_dex_patch_lambda_changed }}
      user_dex_shared_get_lambda_changed: ${{ steps.changes.outputs.user_dex_shared_get_lambda_changed }}
      settings_get_lambda_changed: ${{ steps.changes.outputs.settings_get_lambda_changed }}
      settings_patch_lambda_changed: ${{ steps.changes.outputs.settings_patch_lambda_changed }}
      user_puzzles_get_lambda_changed: ${{ steps.changes.outputs.user_puzzles_get_lambda_changed }}
      user_puzzle_get_lambda_changed: ${{ steps.changes.outputs.user_puzzle_get_lambda_changed }}
      user_puzzle_put_lambda_changed: ${{ steps.changes.outputs.user_puzzle_put_lambda_changed }}
      admin_bonus_puzzle_post_lambda_changed: ${{ steps.changes.outputs.admin_bonus_puzzle_post_lambda_changed }}
      cognito_metrics_lambda_changed: ${{ steps.changes.outputs.cognito_metrics_lambda_changed }}
      user_dex_stack_changed: ${{ steps.changes.outputs.user_dex_stack_changed }}
      cognito_metrics_stack_changed: ${{ steps.changes.outputs.cognito_metrics_stack_changed }}
      pokedoku_details_changed: ${{ steps.changes.outputs.pokedoku_details_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.6.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect deploy-relevant changes
        id: changes
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: bash .github/scripts/detect-changes.sh

  validate-and-pages:
    needs: detect-changes
    uses: ./.github/workflows/reusable-validate.yml
    permissions:
      contents: read
      pages: write
      id-token: write

  site-deploy:
    needs:
      - detect-changes
      - validate-and-pages
    uses: ./.github/workflows/reusable-site-deploy.yml
    secrets: inherit
    with:
      site_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_site_deploy) || needs.detect-changes.outputs.site_changed == 'true') && 'true' || 'false' }}
      data_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_site_deploy) || needs.detect-changes.outputs.data_changed == 'true') && 'true' || 'false' }}
      images_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_site_deploy) || needs.detect-changes.outputs.images_changed == 'true') && 'true' || 'false' }}
      website_stack_changed: ${{ needs.detect-changes.outputs.website_stack_changed }}

  infra-deploy:
    needs:
      - detect-changes
      - validate-and-pages
    uses: ./.github/workflows/reusable-infra-deploy.yml
    secrets: inherit
    with:
      daily_lambda_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_infra_deploy) || needs.detect-changes.outputs.daily_lambda_changed == 'true') && 'true' || 'false' }}
      stats_lambda_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_infra_deploy) || needs.detect-changes.outputs.stats_lambda_changed == 'true') && 'true' || 'false' }}
      daily_stack_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_infra_deploy) || needs.detect-changes.outputs.daily_stack_changed == 'true') && 'true' || 'false' }}
      stats_stack_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_infra_deploy) || needs.detect-changes.outputs.stats_stack_changed == 'true') && 'true' || 'false' }}

  public-api-deploy:
    needs:
      - detect-changes
      - validate-and-pages
    uses: ./.github/workflows/reusable-public-api-deploy.yml
    secrets: inherit
    with:
      user_dex_get_lambda_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_public_api_deploy) || needs.detect-changes.outputs.user_dex_get_lambda_changed == 'true') && 'true' || 'false' }}
      user_dex_patch_lambda_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_public_api_deploy) || needs.detect-changes.outputs.user_dex_patch_lambda_changed == 'true') && 'true' || 'false' }}
      user_dex_shared_get_lambda_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_public_api_deploy) || needs.detect-changes.outputs.user_dex_shared_get_lambda_changed == 'true') && 'true' || 'false' }}
      settings_get_lambda_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_public_api_deploy) || needs.detect-changes.outputs.settings_get_lambda_changed == 'true') && 'true' || 'false' }}
      settings_patch_lambda_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_public_api_deploy) || needs.detect-changes.outputs.settings_patch_lambda_changed == 'true') && 'true' || 'false' }}
      user_puzzles_get_lambda_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_public_api_deploy) || needs.detect-changes.outputs.user_puzzles_get_lambda_changed == 'true') && 'true' || 'false' }}
      user_puzzle_get_lambda_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_public_api_deploy) || needs.detect-changes.outputs.user_puzzle_get_lambda_changed == 'true') && 'true' || 'false' }}
      user_puzzle_put_lambda_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_public_api_deploy) || needs.detect-changes.outputs.user_puzzle_put_lambda_changed == 'true') && 'true' || 'false' }}
      admin_bonus_puzzle_post_lambda_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_public_api_deploy) || needs.detect-changes.outputs.admin_bonus_puzzle_post_lambda_changed == 'true') && 'true' || 'false' }}
      user_dex_stack_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_public_api_deploy) || needs.detect-changes.outputs.user_dex_stack_changed == 'true') && 'true' || 'false' }}

  cognito-metrics-deploy:
    needs:
      - detect-changes
      - validate-and-pages
    uses: ./.github/workflows/reusable-cognito-metrics-deploy.yml
    secrets: inherit
    with:
      cognito_metrics_lambda_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_dashboard_deploy) || needs.detect-changes.outputs.cognito_metrics_lambda_changed == 'true') && 'true' || 'false' }}
      cognito_metrics_stack_changed: ${{ ((github.event_name == 'workflow_dispatch' && inputs.force_dashboard_deploy) || needs.detect-changes.outputs.cognito_metrics_stack_changed == 'true') && 'true' || 'false' }}

  pokedoku-details-publish:
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.force_pokedoku_details_publish) || needs.detect-changes.outputs.pokedoku_details_changed == 'true' }}
    needs:
      - detect-changes
      - validate-and-pages
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.6.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare local data fallback
        run: pnpm sync:pokedoku-details:local-data

      - name: Restore Devvit auth session
        env:
          DEVVIT_TOKEN: ${{ secrets.DEVVIT_TOKEN }}
        run: |
          TOKEN_PAYLOAD="$DEVVIT_TOKEN"

          test -n "$TOKEN_PAYLOAD" || (echo "Missing DEVVIT_TOKEN secret" && exit 1)

          mkdir -p "$HOME/.devvit"
          printf '%s' "$TOKEN_PAYLOAD" > "$HOME/.devvit/token"
          chmod 600 "$HOME/.devvit/token"

          {
            echo "DEVVIT_AUTH_TOKEN<<EOF"
            printf '%s\n' "$TOKEN_PAYLOAD"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Verify Devvit authentication
        run: pnpm --dir apps/pokedoku-details exec devvit whoami

      - name: Publish pokedoku-details app
        run: pnpm --dir apps/pokedoku-details launch
