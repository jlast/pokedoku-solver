name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      data_changed: ${{ steps.changes.outputs.data_changed }}
      site_changed: ${{ steps.changes.outputs.site_changed }}
      images_changed: ${{ steps.changes.outputs.images_changed }}
      daily_lambda_changed: ${{ steps.changes.outputs.daily_lambda_changed }}
      stats_lambda_changed: ${{ steps.changes.outputs.stats_lambda_changed }}
      daily_stack_changed: ${{ steps.changes.outputs.daily_stack_changed }}
      stats_stack_changed: ${{ steps.changes.outputs.stats_stack_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect deploy-relevant changes
        id: changes
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: bash .github/scripts/detect-changes.sh

  validate-and-pages:
    needs: detect-changes
    uses: ./.github/workflows/reusable-validate.yml
    permissions:
      contents: read
      pages: write
      id-token: write

  site-deploy:
    needs:
      - detect-changes
      - validate-and-pages
    uses: ./.github/workflows/reusable-site-deploy.yml
    secrets: inherit
    with:
      site_changed: ${{ needs.detect-changes.outputs.site_changed }}
      data_changed: ${{ needs.detect-changes.outputs.data_changed }}
      images_changed: ${{ needs.detect-changes.outputs.images_changed }}

  infra-deploy:
    needs:
      - detect-changes
      - validate-and-pages
    uses: ./.github/workflows/reusable-infra-deploy.yml
    secrets: inherit
    with:
      daily_lambda_changed: ${{ needs.detect-changes.outputs.daily_lambda_changed }}
      stats_lambda_changed: ${{ needs.detect-changes.outputs.stats_lambda_changed }}
      daily_stack_changed: ${{ needs.detect-changes.outputs.daily_stack_changed }}
      stats_stack_changed: ${{ needs.detect-changes.outputs.stats_stack_changed }}
