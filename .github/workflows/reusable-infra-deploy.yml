name: Reusable Infra Deploy

on:
  workflow_call:
    inputs:
      daily_lambda_changed:
        required: true
        type: string
      stats_lambda_changed:
        required: true
        type: string
      daily_stack_changed:
        required: true
        type: string
      stats_stack_changed:
        required: true
        type: string
      user_dex_get_lambda_changed:
        required: true
        type: string
      user_dex_patch_lambda_changed:
        required: true
        type: string
      user_dex_stack_changed:
        required: true
        type: string

permissions:
  contents: read

jobs:
  infra-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.6.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_GITHUB_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_GITHUB_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Verify CloudFormation template revision
        run: |
          echo "Template from commit ${GITHUB_SHA}"
          if grep -E 'ACMValidationRecord|CloudFrontOAC' terraform/daily-puzzle-stack.yaml; then
            echo "Found deprecated resources in daily puzzle template; aborting deploy"
            exit 1
          fi

      - name: Package daily puzzle Lambda
        if: inputs.daily_lambda_changed == 'true'
        run: pnpm package:daily-puzzle-lambda

      - name: Upload daily puzzle Lambda artifact
        if: inputs.daily_lambda_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          LAMBDA_KEY=lambda/daily-puzzle-fetcher-${{ github.sha }}.zip
          aws s3 cp dist-lambda/daily-puzzle-fetcher.zip s3://${S3_BUCKET_NAME}/${LAMBDA_KEY}
          echo "LAMBDA_KEY=${LAMBDA_KEY}" >> "$GITHUB_ENV"

      - name: Package puzzle statistics Lambda
        if: inputs.stats_lambda_changed == 'true'
        run: pnpm package:puzzle-statistics-lambda

      - name: Upload puzzle statistics Lambda artifact
        if: inputs.stats_lambda_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          STATS_LAMBDA_KEY=lambda/puzzle-statistics-${{ github.sha }}.zip
          aws s3 cp dist-lambda/puzzle-statistics.zip s3://${S3_BUCKET_NAME}/${STATS_LAMBDA_KEY}
          echo "STATS_LAMBDA_KEY=${STATS_LAMBDA_KEY}" >> "$GITHUB_ENV"

      - name: Package user dex get Lambda
        if: inputs.user_dex_get_lambda_changed == 'true'
        run: pnpm package:user-dex-get-lambda

      - name: Upload user dex get Lambda artifact
        if: inputs.user_dex_get_lambda_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          USER_DEX_GET_LAMBDA_KEY=lambda/user-dex-get-${{ github.sha }}.zip
          aws s3 cp dist-lambda/user-dex-get.zip s3://${S3_BUCKET_NAME}/${USER_DEX_GET_LAMBDA_KEY}
          echo "USER_DEX_GET_LAMBDA_KEY=${USER_DEX_GET_LAMBDA_KEY}" >> "$GITHUB_ENV"

      - name: Package user dex patch Lambda
        if: inputs.user_dex_patch_lambda_changed == 'true'
        run: pnpm package:user-dex-patch-lambda

      - name: Upload user dex patch Lambda artifact
        if: inputs.user_dex_patch_lambda_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          USER_DEX_PATCH_LAMBDA_KEY=lambda/user-dex-patch-${{ github.sha }}.zip
          aws s3 cp dist-lambda/user-dex-patch.zip s3://${S3_BUCKET_NAME}/${USER_DEX_PATCH_LAMBDA_KEY}
          echo "USER_DEX_PATCH_LAMBDA_KEY=${USER_DEX_PATCH_LAMBDA_KEY}" >> "$GITHUB_ENV"

      - name: Validate daily puzzle CloudFormation template
        run: aws cloudformation validate-template --template-body file://terraform/daily-puzzle-stack.yaml

      - name: Validate puzzle statistics CloudFormation template
        run: aws cloudformation validate-template --template-body file://terraform/puzzle-statistics-stack.yaml

      - name: Validate user dex API CloudFormation template
        run: aws cloudformation validate-template --template-body file://terraform/user-dex-api-stack.yaml

      - name: Deploy daily puzzle CloudFormation stack
        if: inputs.daily_lambda_changed == 'true' || inputs.daily_stack_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          CLOUDFORMATION_STACK_NAME: ${{ secrets.CLOUDFORMATION_STACK_NAME }}
          DAILY_PUZZLE_ALERT_EMAIL: ${{ secrets.DAILY_PUZZLE_ALERT_EMAIL }}
          DAILY_LAMBDA_CHANGED: ${{ inputs.daily_lambda_changed }}
          LAMBDA_KEY: ${{ env.LAMBDA_KEY }}
        run: bash .github/scripts/deploy-daily-stack.sh

      - name: Run daily puzzle fetcher Lambda
        if: inputs.daily_lambda_changed == 'true' || inputs.daily_stack_changed == 'true'
        env:
          CLOUDFORMATION_STACK_NAME: ${{ secrets.CLOUDFORMATION_STACK_NAME }}
          OUTPUT_KEY: DailyPuzzleFetcherFunctionName
        run: STACK_NAME="${CLOUDFORMATION_STACK_NAME:-pokedoku-helper}-daily-puzzle" bash .github/scripts/invoke-lambda.sh

      - name: Deploy puzzle statistics CloudFormation stack
        if: inputs.stats_lambda_changed == 'true' || inputs.stats_stack_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          CLOUDFORMATION_STACK_NAME: ${{ secrets.CLOUDFORMATION_STACK_NAME }}
          STATS_LAMBDA_CHANGED: ${{ inputs.stats_lambda_changed }}
          STATS_LAMBDA_KEY: ${{ env.STATS_LAMBDA_KEY }}
        run: bash .github/scripts/deploy-stats-stack.sh

      - name: Run puzzle statistics Lambda
        if: inputs.stats_lambda_changed == 'true' || inputs.stats_stack_changed == 'true'
        timeout-minutes: 15
        env:
          CLOUDFORMATION_STACK_NAME: ${{ secrets.CLOUDFORMATION_STACK_NAME }}
          OUTPUT_KEY: PuzzleStatisticsFunctionArn
        run: STACK_NAME="${CLOUDFORMATION_STACK_NAME:-pokedoku-helper}-puzzle-statistics" bash .github/scripts/invoke-lambda.sh

      - name: Configure S3 notification for puzzle statistics Lambda
        if: inputs.stats_lambda_changed == 'true' || inputs.stats_stack_changed == 'true'
        env:
          CLOUDFORMATION_STACK_NAME: ${{ secrets.CLOUDFORMATION_STACK_NAME }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: bash .github/scripts/configure-stats-notification.sh

      - name: Verify puzzle statistics S3 notification
        if: inputs.stats_lambda_changed == 'true' || inputs.stats_stack_changed == 'true'
        env:
          CLOUDFORMATION_STACK_NAME: ${{ secrets.CLOUDFORMATION_STACK_NAME }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: bash .github/scripts/verify-stats-notification.sh

      - name: Deploy user dex API CloudFormation stack
        if: inputs.user_dex_get_lambda_changed == 'true' || inputs.user_dex_patch_lambda_changed == 'true' || inputs.user_dex_stack_changed == 'true'
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          CLOUDFORMATION_STACK_NAME: ${{ secrets.CLOUDFORMATION_STACK_NAME }}
          USER_DEX_GET_LAMBDA_CHANGED: ${{ inputs.user_dex_get_lambda_changed }}
          USER_DEX_PATCH_LAMBDA_CHANGED: ${{ inputs.user_dex_patch_lambda_changed }}
          USER_DEX_GET_LAMBDA_KEY: ${{ env.USER_DEX_GET_LAMBDA_KEY }}
          USER_DEX_PATCH_LAMBDA_KEY: ${{ env.USER_DEX_PATCH_LAMBDA_KEY }}
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          API_SUBDOMAIN: ${{ vars.API_SUBDOMAIN }}
          HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
          API_CERTIFICATE_ARN: ${{ secrets.API_CERTIFICATE_ARN }}
          ALLOWED_ORIGIN: ${{ vars.ALLOWED_ORIGIN }}
          COGNITO_REGION: ${{ vars.COGNITO_REGION }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
        run: |
          echo "User Dex deploy preflight values"
          echo "- stack: ${CLOUDFORMATION_STACK_NAME:-pokedoku-helper}-user-dex-api"
          echo "- domain: ${DOMAIN_NAME:-pokedoku-helper.com}"
          echo "- subdomain: ${API_SUBDOMAIN:-api}"
          echo "- hosted zone id present: $([ -n "${HOSTED_ZONE_ID:-}" ] && echo yes || echo no)"
          echo "- certificate arn present: $([ -n "${API_CERTIFICATE_ARN:-}" ] && echo yes || echo no)"
          echo "- cognito user pool id present: $([ -n "${COGNITO_USER_POOL_ID:-}" ] && echo yes || echo no)"
          echo "- cognito client id present: $([ -n "${COGNITO_CLIENT_ID:-}" ] && echo yes || echo no)"
          export DOMAIN_NAME="${DOMAIN_NAME:-pokedoku-helper.com}"
          export API_SUBDOMAIN="${API_SUBDOMAIN:-api}"
          export ALLOWED_ORIGIN="${ALLOWED_ORIGIN:-https://www.pokedoku-helper.com}"
          export COGNITO_REGION="${COGNITO_REGION:-us-east-1}"
          bash .github/scripts/deploy-user-dex-stack.sh

      - name: Debug user dex CloudFormation failure
        if: failure() && (inputs.user_dex_get_lambda_changed == 'true' || inputs.user_dex_patch_lambda_changed == 'true' || inputs.user_dex_stack_changed == 'true')
        env:
          CLOUDFORMATION_STACK_NAME: ${{ secrets.CLOUDFORMATION_STACK_NAME }}
        run: |
          STACK_NAME="${CLOUDFORMATION_STACK_NAME:-pokedoku-helper}-user-dex-api"
          echo "Recent events for ${STACK_NAME}"
          aws cloudformation describe-stack-events --stack-name "${STACK_NAME}" --max-items 25 || true
