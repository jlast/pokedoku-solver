name: Nightly Build

on:
  schedule:
    - cron: '5 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "nightly"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build